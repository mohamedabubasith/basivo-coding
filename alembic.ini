# alembic.ini
# Alembic configuration file.
# Run migrations: alembic upgrade head
# Generate a new migration: alembic revision --autogenerate -m "description"

[alembic]
# Path to the alembic directory (contains env.py and versions/)
script_location = alembic

# Format for auto-generated revision filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file timestamps
timezone = UTC

# Truncate long slug names to this length
truncate_slug_length = 40

# The database URL is read from the environment in env.py,
# so we leave this as a placeholder.
sqlalchemy.url = driver://user:pass@host/dbname

[post_write_hooks]
# Optional: hooks to run after generating migration files (e.g. black, ruff)
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
