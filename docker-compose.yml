###############################################################################
#  Basivo — Production docker-compose
#
#  Just run:
#    docker compose up -d --build
#
#  Secrets are pre-generated and embedded below.
#  To override any value, create a .env file next to this file — Docker
#  Compose reads it automatically (host-side only, never mounted inside
#  containers).
###############################################################################

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB:       basivo
      POSTGRES_USER:     basivo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-c-tIdn0mVQ_OgqelmOVwUVS6XzLnlt7F}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basivo -d basivo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [internal]

  # ── App (FastAPI + built React frontend) ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - projects_data:/app/projects   # persist AI-generated workspace files
    environment:
      # Database (internal network only — never exposed externally)
      DATABASE_URL: "postgresql+asyncpg://basivo:${POSTGRES_PASSWORD:-c-tIdn0mVQ_OgqelmOVwUVS6XzLnlt7F}@db:5432/basivo"

      # Pre-generated secrets — override via .env file on the host if needed
      JWT_SECRET_KEY:  ${JWT_SECRET_KEY:-a192db58bd0180f90f411fea0637c49170e5b331945d33ee6ee54222ede8e3d4}
      ENCRYPTION_KEY:  ${ENCRYPTION_KEY:-Ldl0Ht0RHrTOxP2_K9PSgWlJxu1tvXt3Rb4pq8kQxpY=}

      # JWT settings
      JWT_ALGORITHM:                   HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}

      # CORS — set PUBLIC_URL to your domain in production (e.g. https://app.example.com)
      CORS_ORIGINS: '["${PUBLIC_URL:-http://localhost:8080}","http://localhost:3000"]'

      # App behaviour
      DEBUG:                      "false"
      PROJECTS_ROOT:              /app/projects
      RESET_TOKEN_EXPIRE_MINUTES: 30

      # OpenCode binary — mount from host if installed:
      #   volumes:
      #     - /usr/local/bin/opencode:/usr/local/bin/opencode:ro
      OPENCODE_BINARY:          ${OPENCODE_BINARY:-opencode}
      OPENCODE_TIMEOUT_SECONDS: ${OPENCODE_TIMEOUT:-300}

      # Server tuning
      WORKERS: ${WORKERS:-1}
      PORT:    8000
    networks: [internal, external]

volumes:
  pg_data:       { driver: local }
  projects_data: { driver: local }

networks:
  internal: { internal: true }   # DB is unreachable from outside Docker
  external: {}                   # App is reachable via the exposed port
