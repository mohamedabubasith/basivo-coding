###############################################################################
#  Basivo — Production docker-compose
#
#  All config is mapped INTERNALLY via the environment: section.
#  No .env file is mounted into or needed inside any container.
#
#  The only thing you need on the HOST before running:
#    export JWT_SECRET_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))")
#    export ENCRYPTION_KEY=$(python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
#    export POSTGRES_PASSWORD=<a strong password>
#    docker compose up -d --build
#
#  Or put those three vars in a host-side .env.production file and run:
#    docker compose --env-file .env.production up -d --build
#  (docker-compose reads the host file for variable substitution only;
#   it is NOT mounted into containers)
###############################################################################

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pg_data:/var/lib/postgresql/data
    # All DB credentials are hardcoded here — only accessible inside
    # the 'internal' network, never exposed externally.
    environment:
      POSTGRES_DB:       basivo
      POSTGRES_USER:     basivo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD env var}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basivo -d basivo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [internal]

  # ── App (FastAPI + built React frontend) ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - projects_data:/app/projects   # persist AI-generated workspace files
    # ── Internal environment mapping ─────────────────────────────────────────
    # Every value the app needs is explicitly declared here.
    # Nothing leaks in from the host filesystem.
    environment:
      # Database (points to the internal 'db' service — not exposed externally)
      DATABASE_URL: "postgresql+asyncpg://basivo:${POSTGRES_PASSWORD}@db:5432/basivo"

      # Secrets — injected from host env vars or --env-file (NEVER from a file inside the container)
      JWT_SECRET_KEY:  ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY env var}
      ENCRYPTION_KEY:  ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY env var}

      # JWT settings
      JWT_ALGORITHM:                   HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}

      # CORS — restrict to your domain in production
      CORS_ORIGINS: '["${PUBLIC_URL:-http://localhost:8000}"]'

      # App behaviour
      DEBUG:                    "false"
      PROJECTS_ROOT:            /app/projects
      RESET_TOKEN_EXPIRE_MINUTES: 30

      # OpenCode binary — mount it from host if you have it installed:
      #   volumes:
      #     - /usr/local/bin/opencode:/usr/local/bin/opencode:ro
      OPENCODE_BINARY:          ${OPENCODE_BINARY:-opencode}
      OPENCODE_TIMEOUT_SECONDS: ${OPENCODE_TIMEOUT:-300}

      # Server tuning
      WORKERS: ${WORKERS:-1}
      PORT:    8000
    networks: [internal, external]

volumes:
  pg_data:       { driver: local }
  projects_data: { driver: local }

networks:
  internal: { internal: true }   # DB is unreachable from outside Docker
  external: {}                   # App is reachable via ports:
